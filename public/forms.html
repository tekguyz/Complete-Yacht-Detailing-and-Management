<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify Forms Detection</title>
</head>
<body>
    <!-- This file is for Netlify's build-time form detection crawler -->
    <form 
        name="contact" 
        data-netlify="true" 
        netlify-honeypot="bot-field" 
        action="/forms.html"
        method="POST" 
        enctype="multipart/form-data"
    >
        <input type="hidden" name="form-name" value="contact" />
        <input type="text" name="bot-field" />
        <input type="text" name="name" />
        <input type="tel" name="phone" />
        <input type="text" name="vessel" />
        <input type="text" name="location" />
        <select name="service">
            <option value="ceramic">Ceramic Coating</option>
            <option value="gelcoat">Gelcoat Restoration</option>
            <option value="management">Yacht Management</option>
            <option value="upgrades">Upgrades (Sharrow/Whelen)</option>
            <option value="brokerage">Brokerage</option>
            <option value="other">Other</option>
        </select>
        <input type="file" name="photo" />
        <button type="submit">Send</button>
    </form>
</body>
</html>
